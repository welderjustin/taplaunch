<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TapLaunch — NFC Keychains + Simple Sites for Small Businesses</title>
  <meta name="description" content="TapLaunch creates NFC-embedded keychains and clean, fast websites for small businesses and side hustles. Scan to connect, click to convert." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="home">
  <header class="container header">
    <div class="brand">
      <a href="./" aria-label="Go to homepage"><img src="./assets/logo.png" alt="TapLaunch" /></a>
    </div>
    <nav>
      <a href="./packages.html">Packages</a>
      <a href="./work.html">Work</a>
      <a href="./faq.html">FAQ</a>
      <a href="./index.html#contact" class="btn btn-primary">Get a Quote</a>
    </nav>
  </header>

  <section class="hero container">
    <div class="hero-text">
      <h1 id="hero_title">Tap to connect. Launch your business.</h1>
      <p id="hero_sub">NFC keychains and simple, effective websites for small businesses and side hustles. Hand clients a keychain, they tap, you get the lead.</p>
      <div class="cta-row">
        <a href="#packages" class="btn btn-primary">See Packages</a>
        <a href="#contact" class="btn btn-outline">Get a Quote</a>
      </div>
    </div>

  </section>







  <section id="contact" class="container section">
    <h2>Get a Quote</h2>
    <!-- Formspree (GitHub Pages friendly). Replace XXXXXX with your Formspree form ID. -->
    <form action="https://formspree.io/f/XXXXXX" method="POST">
      <input type="hidden" name="_subject" value="TapLaunch Quote" />
      <input type="hidden" name="_redirect" value="./thanks.html" />
      <div class="row">
        <input name="name" placeholder="Your name" required />
        <input name="email" type="email" placeholder="Email" required />
      </div>
      <div class="row">
        <select name="package" required>
          <option value="Starter">Starter ($500 CAD)</option>
          <option value="Standard">Standard ($850 CAD)</option>
          <option value="Pro">Pro ($1,000 CAD)</option>
          <option value="Custom">Custom</option>
        </select>
        <input name="phone" placeholder="Phone (optional)" />
      </div>
      <textarea name="details" rows="5" placeholder="Tell us about your business and what you need"></textarea>
      <!-- simple honeypot -->
      <div class="hp"><label>Leave this empty<input name="website" /></label></div>
      <button class="btn btn-primary" type="submit">Send</button>
    </form>
  </section>

  <footer class="container footer">
    <div>© TapLaunch. Made in Cochrane, AB.</div>
    <div class="muted">
      <a href="#">Privacy</a> • <a href="#">Terms</a>
    </div>
  </footer>
<script>
fetch('./content/site.json').then(r=>r.json()).then(data=>{
  const h=document.getElementById('hero_title'); if(h) h.textContent=data.hero_title||h.textContent;
  const s=document.getElementById('hero_sub'); if(s) s.textContent=data.hero_sub||s.textContent;
  const pkg=document.querySelector('#packages + .cards')||document.querySelector('#packages');
  if(pkg && data.packages){
    const wrap=document.createElement('div'); wrap.className='cards';
    data.packages.forEach(p=>{
      const c=document.createElement('div'); c.className='card';
      c.innerHTML=`<h3>${p.name}</h3><p>${p.desc}</p>`;
      const ul=document.createElement('ul'); (p.bullets||[]).forEach(b=>{ const li=document.createElement('li'); li.textContent=b; ul.appendChild(li); });
      c.appendChild(ul);
      const price=document.createElement('div'); price.className='price'; price.textContent=p.price; c.appendChild(price);
      wrap.appendChild(c);
    });
    const section=document.querySelector('section#packages');
    const old=section.querySelector('.cards'); if(old) old.replaceWith(wrap); else section.insertBefore(wrap, section.querySelector('.note'));
  }
  const faq=document.querySelector('section#faq');
  if(faq && data.faq){
    const details=faq.querySelectorAll('details'); details.forEach(d=>d.remove());
    data.faq.forEach(item=>{
      const det=document.createElement('details');
      const sum=document.createElement('summary'); sum.textContent=item.q; det.appendChild(sum);
      const p=document.createElement('p'); p.textContent=item.a; det.appendChild(p);
      faq.appendChild(det);
    });
  }
});
</script>
</body>
</html>
